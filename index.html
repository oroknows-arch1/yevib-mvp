<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>YEVIB</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>YEVIB</h1>
  <h2>Your Voice Your Brand</h2>

  <!-- STEP 1: SOURCE -->
  <section style="margin-bottom: 28px;">
    <h3>Step 1: Source Intake</h3>

    <label for="generationMode">Mode:</label>
    <select id="generationMode">
      <option value="express">Express (URL-first)</option>
      <option value="hybrid" selected>Hybrid</option>
      <option value="manual">Manual</option>
    </select>

    <br /><br />

    <label for="businessUrl">Business URL:</label>
    <input
      id="businessUrl"
      type="text"
      placeholder="https://yourbusiness.com"
      style="width:100%; max-width:900px;"
    />

    <br /><br />

    <label for="pastedSourceText">Pasted Text:</label><br />
    <textarea
      id="pastedSourceText"
      rows="6"
      style="width:100%; max-width:900px;"
    ></textarea>

    <br /><br />

    <label for="manualBusinessContext">Manual Context:</label><br />
    <textarea
      id="manualBusinessContext"
      rows="4"
      style="width:100%; max-width:900px;"
    ></textarea>

    <br /><br />
    <button onclick="buildInitialProfile()">Build Profile</button>

    <div id="intakeStatus" style="margin-top: 12px;"></div>
  </section>

  <!-- PROFILE -->
  <section style="margin-bottom: 28px;">
    <h3>Profile</h3>

    <label>Business Name:</label>
    <input id="businessName" type="text" style="width:100%; max-width:900px;" />

    <br /><br />

    <label>Business Summary:</label><br />
    <textarea id="businessSummary" rows="4" style="width:100%; max-width:900px;"></textarea>

    <br /><br />

    <label>Voice Source:</label><br />
    <textarea id="voiceInput" rows="8" style="width:100%; max-width:900px;"></textarea>
  </section>

  <!-- 🔥 QUICK MODE -->
  <section style="margin-bottom: 28px;">
    <h3>Quick Generate</h3>
    <p>Choose what type of post you want:</p>

    <button onclick="quickGenerate('Business')">Business</button>
    <button onclick="quickGenerate('Family')">Family</button>
    <button onclick="quickGenerate('Educational')">Educational</button>
    <button onclick="quickGenerate('Community')">Community</button>
    <button onclick="quickGenerate('Personal')">Personal</button>
  </section>

  <!-- POSTS -->
  <section style="margin-top:20px;">
    <h3>Generated Posts</h3>
    <div id="posts"></div>
  </section>

  <!-- SELECTED + IMAGE -->
  <section style="margin-top:30px;">
    <h3>Selected Post</h3>
    <div id="selectedPost" style="white-space: pre-wrap; margin-bottom:16px;"></div>

    <div id="imageStatus" style="margin-bottom:12px;"></div>

    <img
      id="generatedImage"
      style="display:none; width:100%; max-width:800px; border-radius:10px;"
    >
  </section>

  <script src="app.js"></script>

</body>
</html>
